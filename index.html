<!DOCTYPE html>
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- SEO — keep in sync with site.config.js -->
    <title>Febinsha | Under Construction — Drift While You Wait</title>
    <meta name="description" content="The full experience is currently being assembled. In the meantime, feel free to reach out directly or keep drifting.">

    <!-- Favicon -->
    <link rel="icon" href="Brand-Assets/favicon.ico" sizes="48x48">
    <link rel="icon" type="image/png" href="Brand-Assets/favicon.png" sizes="48x48">
    <link rel="icon" type="image/svg+xml" href="Brand-Assets/Logo white fill.svg">
    <link rel="apple-touch-icon" href="Brand-Assets/favicon.png">
    <link rel="manifest" href="site.webmanifest">

    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Febinsha | Under Construction — Drift While You Wait">
    <meta property="og:description" content="The full experience is currently being assembled. In the meantime, feel free to reach out directly or keep drifting.">
    <meta property="og:url" content="https://febinsha.com">
    <meta property="og:image" content="https://febinsha.com/Brand-Assets/og-image.png">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Febinsha | Under Construction — Drift While You Wait">
    <meta name="twitter:description" content="The full experience is currently being assembled. In the meantime, feel free to reach out directly or keep drifting.">
    <meta name="twitter:image" content="https://febinsha.com/Brand-Assets/og-image.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100;300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="noise"></div>

    <!-- UI overlay -->
    <div class="ui-layer">
        <div class="header-bar">
            <img class="logo" alt="Febinsha logo">
            <div class="controls-hint"><span class="key">↑</span> <span class="key">W</span><span class="label">THROTTLE</span>
<span class="key">↓</span> <span class="key">S</span><span class="label">BRAKE</span>
<span class="key">←</span> <span class="key">→</span> <span class="key">A</span> <span class="key">D</span><span class="label">STEER</span>
<span class="key">SPACE</span><span class="label">HANDBRAKE</span></div>
            <div class="controls-hint-mobile" id="controlsHintMobile"></div>
        </div>
        <div class="status-footer">
            <div class="status-text" id="statusText"></div>
            <div class="speed-indicator" id="speedDisplay">0 km/h</div>
        </div>
    </div>

    <!-- Touch controls (mobile landscape) -->
    <div class="touch-controls" id="touchControls">
        <div class="touch-left">
            <button type="button" class="touch-btn touch-steer" id="btnLeft" aria-label="Steer left"><span class="arrow">&#9664;</span></button>
            <button type="button" class="touch-btn touch-steer" id="btnRight" aria-label="Steer right"><span class="arrow">&#9654;</span></button>
        </div>
        <div class="touch-right">
            <button type="button" class="touch-btn touch-gas" id="btnGas" aria-label="Gas">Gas</button>
            <button type="button" class="touch-btn touch-brake" id="btnBrake" aria-label="Brake">Brake</button>
            <button type="button" class="touch-btn touch-hb" id="btnHB" aria-label="Handbrake">HB</button>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <!-- Contact overlay (content populated by ui.js from config) -->
    <div class="contact-reveal" id="contactOverlay">
        <button type="button" class="contact-close" id="closeContact" aria-label="Close contact">Close &#10005;</button>
        <div class="contact-content">
            <h1 class="contact-title" id="contactTitle"></h1>
            <p class="contact-body" id="contactBody"></p>
            <div class="contact-links" id="contactLinks"></div>
        </div>
    </div>

    <!-- Portrait lock overlay (mobile only) -->
    <div class="portrait-lock" id="portraitLock">
        <div class="portrait-lock-top">
            <img class="portrait-lock-logo" alt="Febinsha logo">
        </div>
        <div class="portrait-lock-mid">
            <div class="tap-phone-wrap" id="tapHand">
                <div class="tap-phone-ripple"></div>
                <div class="tap-phone-ripple"></div>
                <div class="tap-phone-ripple"></div>
                <div class="tap-phone-frame"></div>
            </div>
            <div class="tilt-hint" id="tiltHint">
                <div class="tilt-hint-phone">
                    <div class="tilt-hint-phone-body">
                        <div class="notch"></div>
                        <div class="crosshair"></div>
                        <div class="home-bar"></div>
                    </div>
                </div>
            </div>
            <p id="lockText"></p>
        </div>
        <div class="portrait-lock-bottom">
            <div class="portrait-lock-heading" id="portraitHeading"></div>
            <h2 id="portraitSubheading"></h2>
        </div>
    </div>

    <!-- Scripts: config → ui → game (order matters, no defer/async) -->
    <script src="site.config.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/game.js"></script>

</body>
</html>
