<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Febinsha</title>
    <link rel="icon" href="Brand-Assets/favicon.ico" sizes="48x48">
    <link rel="icon" type="image/png" href="Brand-Assets/favicon.png" sizes="48x48">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100;300&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            width: 100%; height: 100vh;
            background: #F3F1E8;
            color: #121212;
            font-family: 'Outfit', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
        }
        h1 {
            font-size: clamp(4rem, 12vw, 8rem);
            font-weight: 100;
            line-height: 1;
            letter-spacing: -0.04em;
            margin-bottom: 1rem;
        }
        p {
            font-size: 1rem;
            font-weight: 300;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            opacity: 0.6;
            margin-bottom: 2rem;
        }
        a {
            color: #e06030;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 300;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            border-bottom: 1px solid #e06030;
            padding-bottom: 2px;
            transition: opacity 0.2s;
        }
        a:hover { opacity: 0.6; }
        a:focus-visible { outline: 2px solid #e06030; outline-offset: 4px; }
    </style>
</head>
